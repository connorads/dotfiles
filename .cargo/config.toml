# Sandbox every Rust build script (build.rs) via build-wrap: read-only FS, no
# network, writes only to OUT_DIR/TMPDIR. Closes the supply-chain hole the
# age-gates can't reach - build scripts run arbitrary code at build time and
# Cargo has no global ignore-scripts switch. macOS uses Seatbelt, Linux bwrap.
#
# linker points at build-wrap-shim (on PATH via ~/.local/bin), which uses
# build-wrap when installed and falls back to cc otherwise, so a fresh machine
# can still bootstrap cargo (incl. building build-wrap itself). Allowlist crates
# that legitimately need build-time network/FS in ~/.config/build-wrap/config.toml.
[target.'cfg(all())']
linker = "build-wrap-shim"

# build-wrap's Seatbelt profile hard-requires TMPDIR (0.7.0 util/common.rs is
# inlined into each wrapper's main.rs; expand() + unwrap() panic when it is
# unset). Sandboxed agent shells strip TMPDIR, killing every build script.
# Cargo only sets this when the variable is absent, so real shells keep their
# per-user temp dir; /tmp canonicalises to /private/tmp, which also satisfies
# the profile's PRIVATE_TMPDIR derivation.
[env]
TMPDIR = "/tmp"

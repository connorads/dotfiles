model = "gpt-5.5"
model_reasoning_effort = "medium"
tool_output_token_limit = 25000
# Stay under the 272k long-context pricing cliff (gpt-5.5 window is ~1.05M, so
# this is a cost boundary, not a capacity one): >272k input bills 2x input /
# 1.5x output for the whole session. Compact before then so every turn stays at
# the base rate, leaving headroom for tool output + the compaction pass itself.
# Formula: 273000 - (tool_output_token_limit + 15000)
model_auto_compact_token_limit = 233000
personality = "pragmatic"
web_search = "live"
plan_mode_reasoning_effort = "high"
developer_instructions = """
When using the `request_user_input` tool, never set `autoResolutionMs`.
Use question cards when input is needed, and wait indefinitely for the user.
Do not auto-resolve, default, or continue past unanswered question cards.
"""

# Defaults made explicit — sandbox is read-only (upgrades to workspace-write
# after trust prompt), network blocked, approval based on trust decision
sandbox_mode = "read-only"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = false

[notice]
"hide_rate_limit_model_nudge" = true
"hide_gpt-5.1-codex-max_migration_prompt" = true

[features]
unified_exec = true
apply_patch_freeform = true
skills = true
shell_snapshot = true
fast_mode = true
goals = true
# Lifecycle hooks -> ~/.codex/hooks.json (tmux agent-state dots). Trust once via /hooks.
hooks = true

[[skills.config]]
name = "skill-creator"
enabled = false

[plugins."github@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."telegram@claude-plugins-official"]
enabled = false

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[tui]
status_line = ["current-dir", "git-branch", "model-with-reasoning", "context-remaining"]
terminal_title = ["spinner", "project", "git-branch", "model"]

[desktop]
followUpQueueMode = "queue"

[hooks.state]

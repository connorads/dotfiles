# 4-day quarantine (minutes). Mirrors npm/pnpm/uv/bun gates.
minimumReleaseAge = 5760
# Fail closed when no version satisfies the age gate, instead of silently
# falling back to the next-oldest satisfying version (aube's default is
# advisory, unlike pnpm where strict is the default).
minimumReleaseAgeStrict = true
# Amp releases several times a day; keep the quarantine for everything else.
minimumReleaseAgeExclude = [
  "@ampcode/*",
]

# Bloom-filter OSV MAL-* prefilter on lockfile installs (~380KB, ~0.1% FPR)
advisoryBloomCheck = "on"

# Pinned niche tools — intentionally low-download. Bypass `lowDownloadThreshold` (default 1000).
allowedUnpopularPackages = [
  "remobi",
  "@kitlangton/ghui",
  "critique",
]

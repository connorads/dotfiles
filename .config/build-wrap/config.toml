# build-wrap allowlist. Crates/dirs listed here run their build scripts
# UNSANDBOXED. Add a crate only after confirming a sandboxed build failure is a
# legitimate build-time need (network fetch, external toolchain) and not malware.
# Common offenders: *-sys crates, FIPS crates (aws-lc-fips-sys), svm-rs-builds.
#
# Example:
#   [allow]
#   packages = ["aws-lc-fips-sys"]
#   directories = ["~/some/trusted/project"]
[allow]
# sdl2-sys: build.rs copies the compiled libSDL2 dylib into target/<profile>/
# (outside OUT_DIR) so the binary can link/find it - a legitimate build-time FS
# write the sandbox blocks. Well-known *-sys crate; vendored SDL, no network.
packages = ["sdl2-sys"]
directories = []

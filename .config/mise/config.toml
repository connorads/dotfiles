[settings]
experimental = true
npm.package_manager = "bun"
# Prefer prebuilt binaries; compile-from-source fails on NixOS (no FHS toolchain)
node.compile = false
python.compile = false

[env]
PNPM_HOME = "{{env.HOME}}/.local/share/pnpm"

[tools]
python = "3.14"
node = "lts"
pnpm = "10"
bun = "1.3"
uv = "0.9"
"rust" = "1"
hk = "latest"
pkl = "latest"
shfmt = "latest"
shellcheck = "latest"
bats = "latest"
rumdl = "latest"
gcloud = "latest"
aws = "latest"
gemini = "latest"
codex = "latest"
usage = "latest"
hcloud = "latest"
deno = "latest"
claude = "latest"

"aqua:anomalyco/opencode" = "latest"

"github:rtk-ai/rtk" = "latest"

"npm:@elevenlabs/cli" = "latest"
"npm:@github/copilot" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"npm:@playwright/cli" = "latest"
"npm:@ralph-orchestrator/ralph-cli" = "latest"
"npm:@sandbox-agent/gigacode" = "latest"
"npm:@sourcegraph/amp" = "latest"
"npm:agent-browser" = "latest"
"npm:apify-cli" = "latest"
"npm:critique" = "latest"
"npm:ctx7" = "latest"
"npm:firecrawl-cli" = "latest"

[settings]
experimental = true
npm.package_manager = "bun"
# Prefer prebuilt binaries; compile-from-source fails on NixOS (no FHS toolchain)
node.compile = false
python.compile = false
# Supply chain security: only install versions released 14+ days ago
install_before = "14d"
github_attestations = true
slsa = true

[env]
PNPM_HOME = "{{env.HOME}}/.local/share/pnpm"

[tools]
python = "3.14"
node = "lts"
pnpm = "10"
bun = "1.3"
uv = "0.9"
"rust" = "1"
hk = "1"
pkl = "0.31"
shfmt = "3"
shellcheck = "0.11"
bats = "1"
rumdl = "0.1"
gcloud = "562"
aws = "2"
gemini = "0.35"
codex = "0.117"
usage = "3"
hcloud = "1"
deno = "2"
claude = "latest"

"aqua:anomalyco/opencode" = "1"

"github:rtk-ai/rtk" = "0.34"

"npm:@elevenlabs/cli" = "0"
"npm:@github/copilot" = "1"
"npm:@mariozechner/pi-coding-agent" = "0"
"npm:@playwright/cli" = "0"
"npm:@ralph-orchestrator/ralph-cli" = "2"
"npm:@sandbox-agent/gigacode" = "0"
"npm:@sourcegraph/amp" = "0"
"npm:agent-browser" = "0"
"npm:apify-cli" = "1"
"npm:critique" = "0"
"npm:ctx7" = "0"
"npm:firecrawl-cli" = "1"
"npm:flarepilot" = "0"
"npm:playwright" = "1"
"npm:ralph-tui" = "0"
"npm:remobi" = "dev"
"npm:sharp-cli" = "5"
"npm:skills" = "1"
"npm:svgo" = "4"
"npm:vercel" = "50"
"npm:webreel" = "0"
"npm:wrangler" = "4"

"pipx:batrachian-toad" = "0"
"pipx:mistral-vibe" = "2"
"pipx:ty" = "0"


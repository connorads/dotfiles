[settings]
experimental = true
npm.package_manager = "aube"
# `mise run` must not converge the global toolset as a side effect: a stale
# mise.lock (pulled from another machine) otherwise blocks every task on
# registry access, which hard-fails in sandboxed agent sessions (aube does
# its own DNS over UDP:53, which the sandbox denies). Tasks run with the
# tools already installed; provisioning stays with `up` / `mise install`.
task.run_auto_install = false
# Prefer prebuilt binaries; compile-from-source fails on NixOS (no FHS toolchain)
node.compile = false
python.compile = false
# Supply chain security: only install versions released 4+ days ago.
minimum_release_age = "4d"
minimum_release_age_excludes = ["claude", "codex", "amp"]
github_attestations = true
slsa = true
# Re-verify SLSA/attestations at install time even when the lockfile already
# has a checksum (otherwise verification is skipped on lockfile hits).
locked_verify_provenance = true
# Pin exact versions + checksums across platforms (the mise analogue of
# flake.lock). lockfile_platforms records checksums for machines we don't
# build on (current platform is always added regardless); other-platform
# checksums come from registry metadata, no downloads.
lockfile = true
lockfile_platforms = ["macos-arm64", "linux-arm64", "linux-x64"]

[env]
PNPM_HOME = "{{env.HOME}}/.local/share/pnpm"

[tools]
python = "3.14"
node = "lts"
pnpm = "11"
bun = "1.3"
aube = "1"
uv = "0.11"
"rust" = "1"
hk = "1"
pkl = "0.31"
shfmt = "3"
shellcheck = "0.11"
bats = "1"
rumdl = "0.2"
gitleaks = "8"
# oxlint: first-party JS/TS lint for the hk pipeline - default correctness
# rules only, no type-aware rules (several first-party dirs lack tsconfigs).
oxlint = "1"
# ruff: first-party Python lint + format gate (hk ruff-check/ruff-format +
# `mise run py-checks`). Registry-backed (aqua:astral-sh/ruff) so it carries
# native attestation/checksums. Config: .hk-hooks/ruff.toml, passed with
# --config so it stays a gate config, not the global XDG default.
ruff = "0.15"
gcloud = "573"
aws = "2"
codex = "latest"
usage = "3"
hcloud = "1"
deno = "2"
# Doc conversion: pandoc handles structured formats (EPUB/HTML/DOCX -> md);
# companion to docling/markitdown below. Registry-backed (github:jgm/pandoc).
pandoc = "3"
# postinstall reapplies the --channels (master gate + allowlist), computer-use,
# and session-reaper binary patches to each freshly installed bundle
# (claude = "latest" drops an unpatched build on every update), then runs
# claude-commit-note-check: a read-only guard that verifies the built-in
# Bash-tool git note the ~/.claude/system-append.md override countermands still
# exists. Each warns + drops a marker but exits 0 on a missing needle, so an
# update is never blocked; chained with ; so later steps still run if an earlier
# one warns.
claude = { version = "latest", postinstall = "$HOME/.config/zsh/functions/claude/claude-channels-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"; $HOME/.config/zsh/functions/claude/claude-channels-allowlist-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"; $HOME/.config/zsh/functions/claude/claude-computer-use-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"; $HOME/.config/zsh/functions/claude/claude-session-reaper-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"; $HOME/.config/zsh/functions/claude/claude-commit-note-check --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"" }
fnox = "1"

# github:/aqua tools: undateable releases slip the 4d gate, so the pin — not the
# age gate — is the supply-chain control here. Keep these exact/known-good.
"aqua:anomalyco/opencode" = "1"
"aqua:google/osv-scanner" = "2"
# shenwei356/rush: parallel dispatcher for `bats --jobs` (lighter than GNU parallel)
"aqua:shenwei356/rush" = "0"

"github:ogulcancelik/herdr" = "0.7"
"github:can1357/oh-my-pi" = "16"
"github:tamnd/kage" = "0.3"
# prerelease=true: all releases are flagged pre-release. bin=cos: chmods it executable.
"github:CosineAI/cli" = { version = "2", bin = "cos", prerelease = true }
"github:CosineAI/argusred-dist" = { version = "0.1", bin = "argusred" }

# OS-level sandbox runtime (srt) wrapping CLI agents via agent-sandbox. Exact
# pin: config schema is pre-1.0 and churns; the validate-before-mv render + the
# policy pre-check in the dispatcher contain a breaking change. macOS runtime
# dep: ripgrep (nix-provided). No install scripts (no aube allowlist needed).
"npm:@anthropic-ai/sandbox-runtime" = "0.0.62"
"npm:@elevenlabs/cli" = "0"
"npm:@kitlangton/ghui" = "latest"
# Reapply local generated-JS image paste patch after Pi updates. The script
# exits 0 on a missing needle so update is never blocked; it drops a stale marker.
"npm:@earendil-works/pi-coding-agent" = { version = "latest", postinstall = "$HOME/.config/zsh/functions/pi/pi-image-paste-patch --reapply \"$MISE_TOOL_INSTALL_PATH\"" }
"npm:@playwright/cli" = "0"
# tsgo: native-preview TypeScript compiler for first-party TS typecheck steps
# (hk ts-typecheck-* + `mise run ts-checks`). Prerelease-only package, so pin an
# exact dev build - a "7" range matches nothing (node-semver skips prereleases).
"npm:@typescript/native-preview" = "7.0.0-dev.20260707.2"
"npm:@redwoodjs/agent-ci" = "0"
# Local hybrid search (FTS + vector + rerank) over the kb Obsidian vault; also
# pinned in ~/git/kb/mise.toml so the repo documents its own dependency.
# qmd pulls native deps (better-sqlite3, node-llama-cpp, tree-sitter-*) whose
# install scripts aube blocks by default. mise regenerates the aube-global
# package.json (the file the build gate reads) on every install, so a global
# allowBuilds can't persist the approval - the postinstall re-approves + rebuilds
# this tool's own deps after each install. Narrow (scoped to qmd's install dir),
# idempotent, and exits 0 so an install is never blocked (run `qmd doctor` if it
# warns). Same self-healing shape as the claude/pi postinstall patches above.
"npm:@tobilu/qmd" = { version = "2", postinstall = 'd=$(dirname "$(find "$MISE_TOOL_INSTALL_PATH/global-aube" -name package.json 2>/dev/null | head -1)"); [ -n "$d" ] && aube approve-builds --all -C "$d" && aube rebuild -C "$d" || echo "qmd: native build approve/rebuild skipped or failed - run: qmd doctor" >&2' }
"npm:agent-browser" = "0"
"npm:agent-device" = "0"
"npm:serve-sim" = "latest"
"npm:apify-cli" = "1"
"npm:cf" = "latest"
"npm:critique" = "0"
"npm:ctx7" = "0"
"npm:deepsec" = "2"
# Hold on 1.x: npm `latest` is 1.5.x; 2.0.0 is a stray off-`latest` major, so
# `mise upgrade --bump` would regress to it. Do not bump past "1".
"npm:executor" = "1"
"npm:firecrawl-cli" = "1"
"npm:hunkdiff" = "0"
"npm:obsidian-headless" = "0.0"
"npm:playwright" = "1"
"npm:portless" = "0"
"npm:remobi" = "1"
"npm:sharp-cli" = "5"
"npm:skills" = "1"
"npm:svgo" = "4"
"npm:vercel" = "50"
"npm:wrangler" = "4"

"pipx:batrachian-toad" = "0"
# Tau docs install with `uv tool install tau-ai`; mise's pipx backend uses uv
# when available and forwards minimum_release_age to uv's exclude-newer guard.
"pipx:tau-ai" = "0"
# extras: the document/media set. NOT "all" — that drags in az-doc-intel /
# azure-ai-contentunderstanding which only ships as a pre-release, so the
# resolver fails closed (no pre-releases enabled).
"pipx:markitdown" = { version = "0", extras = "pdf,docx,pptx,xlsx,xls,outlook,audio-transcription,youtube-transcription" }
# Better PDF->md engine than markitdown's pdfminer extra (layout/tables/OCR).
# Pulls a torch closure; kept in pipx (not nix) so it stays off the system
# profile. Downloads layout models at first run. For gnarly academic PDFs that
# docling can't handle, reach for `uvx --from mineru mineru ...` on demand.
"pipx:docling" = "2"
# Pinned <2.0.70: rembg 2.0.70+ hard-pins numpy>=2.3, but its transitive
# numba/llvmlite chain can't go that high, forcing the resolver onto ancient
# numba 0.53.1 -> llvmlite 0.36.0 which won't build on Python >=3.10.
# --with numpy<2.3 stops uv greedily picking numpy 2.3 and keeps the modern
# numba 0.65.1 / llvmlite 0.47.0 stack (builds on 3.13/3.14). See upstream
# danielgatis/rembg: numpy floor bump broke the numba dep chain.
"pipx:rembg" = { version = "2.0.69", extras = "cli,cpu", uvx_args = "--with numpy<2.3" }
"pipx:ty" = "0"
# pyrefly: first-party Python typecheck gate (hk py-typecheck-*), scoped to the
# two green hook dirs. No aqua registry entry, so pipx backend (mirrors pipx:ty)
# - weaker provenance than aqua, but forwards minimum_release_age to uv's
# --exclude-newer. ty above is kept for editor/LSP use; pyrefly owns the gate.
"pipx:pyrefly" = "1"

# Cargo tools (Rust): think twice before adding; builds are slow.
# Sandboxes build.rs for every cargo build via ~/.cargo/config.toml's linker
# shim. Not in nixpkgs, so mise (cargo backend) keeps it in mise.lock.
"cargo:build-wrap" = "0.7"
# Amp is pinned globally; aube exempts @ampcode/* from the age gate.
amp = { version = "0.0.1783547350-gd57707", allow_builds = ["@ampcode/cli"] }

[tasks.zsh-tests]
description = "Run BATS tests for zsh functions (parallel)"
env = { BATS_PARALLEL_BINARY_NAME = "rush" }
run = "cd \"$HOME\" && bats -j \"$(sysctl -n hw.logicalcpu 2>/dev/null || nproc)\" --no-parallelize-within-files --recursive .config/zsh/tests"

[tasks.zsh-tests-fast]
description = "Run only fast (non-integration) BATS tests (parallel)"
env = { BATS_PARALLEL_BINARY_NAME = "rush" }
run = "cd \"$HOME\" && bats -j \"$(sysctl -n hw.logicalcpu 2>/dev/null || nproc)\" --no-parallelize-within-files --filter-tags '!integration' --recursive .config/zsh/tests"

[tasks.claude-hook-tests]
description = "Run pytest suite for Claude Code hooks (mise python has no pytest; uv supplies it)"
run = "cd \"$HOME/.claude/hooks\" && uv run --with pytest python -m pytest -q"

[tasks.ts-checks]
description = "Typecheck + test all first-party TS projects (installs deps as needed)"
run = """
set -e
cd "$HOME"
(cd .config/skl && bun install --frozen-lockfile && tsgo -p tsconfig.json && bun test)
for d in .pi/agent/extensions/goal .pi/agent/extensions/workflows; do
  (cd "$d" && pnpm install --frozen-lockfile && pnpm run typecheck && pnpm test)
done
(cd .pi/agent/extensions/pi-palette && pnpm install --frozen-lockfile && pnpm run typecheck && pnpm run test)
(cd .pi/agent/extensions && pnpm install --frozen-lockfile && pnpm run typecheck)
(cd .pi/agent/extensions/web-search && node --test core.test.mjs)
"""

[tasks.py-checks]
description = "Lint + typecheck + test all first-party Python (ruff, pyrefly, pytest)"
run = """
set -e
cd "$HOME"
git --git-dir="$HOME/git/dotfiles" --work-tree="$HOME" ls-files '*.py' '*.pyi' \
  | grep -vE '/vendor/\\.agents/skills/|/\\.agents/skills/playwright-cli/|\\.config/skills/vendor/patches/|/evals/fixtures/|^skills/.*/references/|\\.config/skills/.*/references/' \
  | xargs ruff check --config .hk-hooks/ruff.toml
for d in .claude/hooks .hk-hooks; do (cd "$d" && pyrefly check); done
(cd .claude/hooks && uv run --with pytest python -m pytest -q)
(cd .hk-hooks && uv run --with pytest python -m pytest -q)
"""

[tasks.supply-audit]
description = "Scan CWD lockfiles for vulnerable/malicious deps via OSV (npm, Cargo, uv, ...)"
run = "osv-scanner scan source -r ."

[tasks.lockfile-audit]
description = "Scan tracked repo lockfiles for malware (MAL-*, blocking) + CVEs (report) via OSV"
run = "lockfile-audit"

[tasks.pin-audit]
description = "Recheck conditional version pins/excludes (fnox, clipboard, rembg, ...) - report-only"
run = "pin-audit"

[settings]
experimental = true
npm.package_manager = "aube"
# Prefer prebuilt binaries; compile-from-source fails on NixOS (no FHS toolchain)
node.compile = false
python.compile = false
# Supply chain security: only install versions released 4+ days ago
install_before = "4d"
github_attestations = true
slsa = true

[env]
PNPM_HOME = "{{env.HOME}}/.local/share/pnpm"

[tools]
python = "3.14"
node = "lts"
pnpm = "11"
bun = "1.3"
aube = "1"
uv = "0.9"
"rust" = "1"
hk = "1"
pkl = "0.31"
shfmt = "3"
shellcheck = "0.11"
bats = "1"
rumdl = "0.1"
gitleaks = "8"
gcloud = "562"
aws = "2"
codex = "latest"
usage = "3"
hcloud = "1"
deno = "2"
# postinstall reapplies the --channels binary patch to each freshly installed
# bundle (claude = "latest" drops an unpatched build on every update). Warns +
# drops a marker but exits 0 on a missing needle, so an update is never blocked.
claude = { version = "latest", postinstall = "$HOME/.config/zsh/functions/claude/claude-channels-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"" }
# Pinned to 1.26: 1.27.0 shipped with no binary assets (any platform); the github
# backend grabs it as highest 1.x and the assetless install aborts every `mise run`.
# 1.27.1 fixed it but mise's ls-remote won't surface it. Revisit when 1.28 lands.
fnox = "1.26"

# github:/aqua: tools: the install_before/minimum_release_age quarantine is
# best-effort here — it only filters versions mise has a timestamp for, and
# "versions without timestamps are included by default" (mise docs). So a fresh
# release can slip the 4d gate. Prefer an exact/known-good pin on these backends;
# the pin, not the age gate, is the supply-chain control.
"aqua:anomalyco/opencode" = "1"

"github:ogulcancelik/herdr" = "0.6.0"
# prerelease=true: all releases are flagged pre-release. bin=cos: chmods it executable.
"github:CosineAI/cli" = { version = "2.0.21", bin = "cos", prerelease = true }

"npm:@elevenlabs/cli" = "0"
"npm:@kitlangton/ghui" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:@playwright/cli" = "0"
"npm:@redwoodjs/agent-ci" = "0"
"npm:agent-browser" = "0"
"npm:agent-device" = "0"
"npm:apify-cli" = "1"
"npm:cf" = "0"
"npm:critique" = "0"
"npm:ctx7" = "0"
"npm:executor" = "1"
"npm:firecrawl-cli" = "1"
"npm:hunkdiff" = "0"
"npm:obsidian-headless" = "0.0.10"
"npm:playwright" = "1"
"npm:portless" = "0"
"npm:remobi" = "1"
"npm:sharp-cli" = "5"
"npm:skills" = "1"
"npm:svgo" = "4"
"npm:vercel" = "50"
"npm:wrangler" = "4"

"pipx:batrachian-toad" = "0"
"pipx:rembg" = { version = "2", extras = "cli,cpu" }
"pipx:ty" = "0"

# Cargo tools (Rust): think twice before adding; builds are slow.

[tasks.zsh-tests]
description = "Run BATS tests for zsh functions"
run = "cd \"$HOME\" && bats --recursive .config/zsh/tests"

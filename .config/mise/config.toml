[settings]
experimental = true
npm.package_manager = "aube"
# Prefer prebuilt binaries; compile-from-source fails on NixOS (no FHS toolchain)
node.compile = false
python.compile = false
# Supply chain security: only install versions released 4+ days ago.
# `install_before` is deprecated; `minimum_release_age` is the canonical key.
minimum_release_age = "4d"
# Claude and Codex track upstream as fast as possible, so exempt them from the
# quarantine here (replaces `mise upgrade claude codex --before 0d` in `up`).
minimum_release_age_excludes = ["claude", "codex"]
github_attestations = true
slsa = true

[env]
PNPM_HOME = "{{env.HOME}}/.local/share/pnpm"

[tools]
python = "3.14"
node = "lts"
pnpm = "11"
bun = "1.3"
aube = "1"
uv = "0.9"
"rust" = "1"
hk = "1"
pkl = "0.31"
shfmt = "3"
shellcheck = "0.11"
bats = "1"
rumdl = "0.2"
gitleaks = "8"
gcloud = "573"
aws = "2"
codex = "latest"
usage = "3"
hcloud = "1"
deno = "2"
# postinstall reapplies the --channels and computer-use binary patches to each
# freshly installed bundle (claude = "latest" drops an unpatched build on every
# update). Each warns + drops a marker but exits 0 on a missing needle, so an
# update is never blocked; chained with ; so cu still runs if channels warns.
claude = { version = "latest", postinstall = "$HOME/.config/zsh/functions/claude/claude-channels-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"; $HOME/.config/zsh/functions/claude/claude-computer-use-patch --reapply \"$MISE_TOOL_INSTALL_PATH/claude\"" }
# Pinned to EXACT 1.27.1: v1.27.1 ships binaries (8 assets) but v1.27.0 shipped
# none AND was published ~20 min later, so the github backend resolves a "1.27"
# range to the assetless 1.27.0 and every `mise run` aborts. The exact pin
# sidesteps the bad sibling; loosen toward a range once 1.28 lands.
fnox = "1.27.1"

# github:/aqua tools: the minimum_release_age quarantine applies to versions
# mise can date (most GitHub releases carry a published-at), but "versions
# without timestamps are included by default" (mise docs) — so a release mise
# can't date still slips the 4d gate. Keep an exact/known-good pin on these
# backends; the pin, not the age gate, is the supply-chain control.
"aqua:anomalyco/opencode" = "1"
# osv-scanner: detective supply-chain layer. Scans lockfiles (npm, Cargo, uv,
# etc.) against the OSV database for known-vulnerable/malicious deps — the one
# layer that catches what already slipped past the time-based gates. Major range
# (vs an exact pin) is deliberate: keep the scanner itself current. Run via
# `mise run supply-audit`.
"aqua:google/osv-scanner" = "2"

"github:ogulcancelik/herdr" = "0.7.0"
# prerelease=true: all releases are flagged pre-release. bin=cos: chmods it executable.
"github:CosineAI/cli" = { version = "2.0.22", bin = "cos", prerelease = true }

"npm:@elevenlabs/cli" = "0"
"npm:@kitlangton/ghui" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:@playwright/cli" = "0"
"npm:@redwoodjs/agent-ci" = "0"
"npm:agent-browser" = "0"
"npm:agent-device" = "0"
"npm:apify-cli" = "1"
"npm:cf" = "0"
"npm:critique" = "0"
"npm:ctx7" = "0"
# Hold on 1.x: npm `latest` is 1.5.x; 2.0.0 is a stray off-`latest` major, so
# `mise upgrade --bump` would regress to it. Do not bump past "1".
"npm:executor" = "1"
"npm:firecrawl-cli" = "1"
"npm:hunkdiff" = "0"
"npm:obsidian-headless" = "0.0.12"
"npm:playwright" = "1"
"npm:portless" = "0"
"npm:remobi" = "1"
"npm:sharp-cli" = "5"
"npm:skills" = "1"
"npm:svgo" = "4"
"npm:vercel" = "50"
"npm:wrangler" = "4"

"pipx:batrachian-toad" = "0"
"pipx:rembg" = { version = "2", extras = "cli,cpu" }
"pipx:ty" = "0"

# Cargo tools (Rust): think twice before adding; builds are slow.

[tasks.zsh-tests]
description = "Run BATS tests for zsh functions"
run = "cd \"$HOME\" && bats --recursive .config/zsh/tests"

[tasks.supply-audit]
description = "Scan CWD lockfiles for vulnerable/malicious deps via OSV (npm, Cargo, uv, ...)"
run = "osv-scanner scan source -r ."

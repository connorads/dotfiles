##### tmux config #####
# NOTE: When adding/changing keybindings, also update ~/.config/tmux/help.md

# Snappy Esc (vi copy-mode); 10 is the tmux 3.7 default. The OpenCode
# hex/rgb-fragment bug that once forced a higher value is fixed upstream
# (tmux #4793, opentui #490), and 3.7 lengthens the escape delay itself when a
# partial paste-end sits in the buffer — so a low static value stays safe.
set -sg escape-time 10

# True colour (RGB) support - needed for editors like micro, neovim.
# terminal-features RGB is the modern mechanism (tmux 3.2+) and supersedes the
# legacy terminal-overrides ',*:Tc' override.
set -as terminal-features ',tmux-256color:RGB,xterm-256color:RGB'
set -as terminal-features ',*:clipboard'
# Mosh 1.4 accepts OSC 52 clipboard writes reliably when the clipboard target is
# forced to "c"; tmux's default Ms uses the selector passed by the application.
set-option -g terminal-overrides 'linux*:AX@,xterm-256color:Ms=\E]52;c;%p2%s\007'

# Extended keys (tmux 3.2+) - helps pass modifier combos to apps
# Note: Shift+Enter doesn't work reliably through tmux+kitty; use Alt+Enter
# for newlines in Claude Code / OpenCode instead
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Forward terminal focus in/out events to programs in panes
# Lets nvim FocusGained/FocusLost fire on pane/window switch (auto :checktime etc.)
set -g focus-events on

# Forward pane/window titles to outer terminal
set -g set-titles on
set -g set-titles-string "#{host_short} | #{b:pane_current_path} | #{pane_current_command}"

# Large scrollback (tmux default: 2000 lines)
set -g history-limit 75000

# Mouse: scroll, select panes, resize panes
# If you hate mouse behaviour later, set this to "off".
set -g mouse on
# pane-scrollbars: off, but a candidate to reconsider. Cosmetic (a copy-mode
# position hint); they redraw through the same screen-redraw path the local
# dim + split-status patches hook. A server crash once attributed to a 'modal'
# trial is unconfirmed - it never reproduced, and modal+copy-mode is exercised
# without incident by ~/.config/zsh/tests/tmux-render-smoke.bats. Adopt after
# an interactive mouse sign-off (drag the scrollbar thumb; the harness cannot
# drive mouse input).

# Make the status bar more readable and include session/window info + host/time
set -g status-interval 15

# Split two-row status bar (requires local Nix tmux patch): windows at terminal
# top, system chrome at terminal bottom. Without the patch, tmux falls back to
# upstream behaviour and keeps both rows together.
set -g status 2
set -g @connorads-split-status on
set -g message-line 1
# Row 0: status-left + window list (default template minus status-right)
set -g 'status-format[0]' '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{E:window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{E:window-status-separator}}}#[nolist align=right]'
# Row 1: status-right only (system stats, mode indicator, clock)
set -g 'status-format[1]' '#[align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -gu 'status-format[2]'

# Colours (Catppuccin Mocha palette, Powerline style)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name with Powerline arrow (full >= 80, compact >= 50, ultra < 50)
# Breakpoints differ from status-right (120/90/60): left has less content so
# it can stay readable at narrower widths before needing to collapse.
set -g status-left "#{?#{e|>=:#{client_width},80},#[bg=#89b4fa]#[fg=#1e1e2e]#[bold]  #S #{?window_zoomed_flag,#[bg=#f38ba8]#[fg=#89b4fa]#[fg=#1e1e2e]  #P/#{window_panes} #[bg=#1e1e2e]#[fg=#f38ba8],#[bg=#313244]#[fg=#89b4fa]#[fg=#94e2d5]  #P/#{window_panes} #[bg=#1e1e2e]#[fg=#313244]},#{?#{e|>=:#{client_width},50},#[bg=#89b4fa]#[fg=#1e1e2e]#[bold] #S #[bg=#1e1e2e]#[fg=#89b4fa]#{?window_zoomed_flag,#[bg=#f38ba8]#[fg=#89b4fa]#[fg=#1e1e2e]#[bold]  #[bg=#1e1e2e]#[fg=#f38ba8],},#[bg=#89b4fa]#[fg=#1e1e2e]#[bold] #{=4:#S}#[bg=#1e1e2e]#[fg=#89b4fa]#{?window_zoomed_flag,#[bg=#f38ba8]#[fg=#89b4fa]#[fg=#1e1e2e]#[bold]  #[bg=#1e1e2e]#[fg=#f38ba8],}}}"
set -g status-left-length 50

# Right: responsive per-client via #{client_width} (row 1 has full width)
#   >= 140: full + weekly AI windows (Claude/Codex days-left details)
#   115-139: full + compact AI windows
#   80-114: full system chrome, no AI pill
#   45-79: medium (git, host, mode, time)
#   35-44: compact (host + time)
#   < 35:  mobile (time only)
set -g status-right "#(~/.config/tmux/scripts/status-right.sh \"#{client_width}\" \"#{pane_current_path}\" \"#{host_short}\" \"#{host}\" \"#{@hostname_full}\") #{?#{e|>=:#{client_width},60},#{tmux_mode_indicator},}#[bg=#94e2d5]#[fg=#1e1e2e]#[bold] #{?#{e|>=:#{client_width},80},%d %b ,}%H:%M "
set -g status-right-length 180

##### Mode indicator + suspend (inline) #####

set -g @mode_indicator_prefix_mode_style "bg=#89b4fa,fg=#1e1e2e"
set -g @mode_indicator_copy_mode_style "bg=#f9e2af,fg=#1e1e2e"
set -g @mode_indicator_sync_mode_style "bg=#f38ba8,fg=#1e1e2e"
set -g @mode_indicator_ssh_mode_style "bg=#f38ba8,fg=#1e1e2e"
set -g @mode_indicator_empty_mode_style "bg=#b4befe,fg=#1e1e2e"

set -g @suspend_suspended_options " \
  @mode_indicator_custom_prompt:: SUSPEND , \
  @mode_indicator_custom_mode_style::bg=#45475a\\,fg=#bac2de \
"

# Suspend/resume key (global, no prefix)
set -g @suspend_key 'F10'

run-shell "~/.config/tmux/tmux-mode-indicator.tmux"
run-shell "~/.config/tmux/tmux-suspend.tmux"

# Window tabs (Powerline pill style)
# Tabs show index + visible label + agent dot. With automatic-rename on, the
# visible label is the cwd basename (the informal "project"); with
# automatic-rename off, it is #W so manual `rename-window` labels show up.
# Active tab turns red (f38ba8) when pane runs ssh or tailscale (unless suspended),
# otherwise uses default grey (45475a). Unseen changes get a "+" suffix.
# Inactive tab fg is Catppuccin subtext1 (#bac2de), not overlay0 (#6c7086): the
# latter is designed for non-text chrome (separators, disabled glyphs) and gives
# ~2.6:1 contrast on surface0 (#313244) — below WCAG AA. subtext1 lifts that to
# ~6.7:1 and stays clearly subordinate to the active pill.
# Agent-state dot appended to each window tab. agent-state.sh sets the per-window
# @win_agent_state (blocked|working|done|idle); this maps it to a Mocha-coloured
# glyph whose SHAPE also encodes state (so it reads even on a colour clash, and
# for colour-blind use): ◆ blocked · ◐ working · ● done · ○ idle · · unknown.
# working is peach (not yellow): one colour per state regardless of focus, and
# peach clears both the dark inactive tab and the yellow-on-grey active tab —
# yellow would dissolve into the active tab's same-yellow text.
# Rendered per-window via #{E:@agent_dotfmt} below; empty when no agent.
set -g @agent_dotfmt "#{?@win_agent_state, #{?#{==:#{@win_agent_state},blocked},#[fg=#f38ba8]◆,#{?#{==:#{@win_agent_state},working},#[fg=#fab387]◐,#{?#{==:#{@win_agent_state},done},#[fg=#89b4fa]●,#{?#{==:#{@win_agent_state},idle},#[fg=#a6e3a1]○,#[fg=#6c7086]·}}}},}"
set -g window-status-format "#[fg=#1e1e2e#,bg=#313244]#{?#{window_bell_flag},#[fg=#f9e2af],#[fg=#bac2de]}#I #{=14:#{?automatic-rename,#{b:pane_current_path},#{window_name}}}#{E:@agent_dotfmt}#[fg=#313244#,bg=#1e1e2e]"
set -g window-status-current-format "#{?#{&&:#{||:#{m:ssh,#{pane_current_command}},#{m:tailscale,#{pane_current_command}}},#{!=:#{client_key_table},suspended}},#[fg=#1e1e2e#,bg=#f38ba8]#[fg=#1e1e2e#,bold] #I  #{=18:#{?automatic-rename,#{b:pane_current_path},#{window_name}}}#{?#{pane_unseen_changes},+,}#{E:@agent_dotfmt} #[fg=#f38ba8#,bg=#1e1e2e],#[fg=#1e1e2e#,bg=#45475a]#[fg=#f9e2af#,bold]#I #{=18:#{?automatic-rename,#{b:pane_current_path},#{window_name}}}#{?#{pane_unseen_changes},+,}#{E:@agent_dotfmt}#[fg=#45475a#,bg=#1e1e2e]}"
set -g window-status-separator " "

# Inactive-pane content dimming (works with the patched tmux — see
# ~/.config/nix/patches/). The colour_dim patch only dims cells with an
# *explicit* colour; cells using the terminal default fg (fg=8) — e.g. Claude
# Code's white body text — are returned unchanged. Setting these two styles
# identical to kitty's mocha fg/bg gives those default-fg cells a concrete RGB
# (defaults->fg), so the patch dims them uniformly with everything else. The
# styles dim nothing themselves (active == inactive); they exist purely to
# resolve fg=8 → RGB. Match these to the terminal theme's fg/bg.
set -g window-style        "fg=#cdd6f4,bg=#1e1e2e"
set -g window-active-style "fg=#cdd6f4,bg=#1e1e2e"

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format '#P "#{pane_title}"#{?@agent_name,#[fg=#89b4fa]  ⟪#{@agent_name}⟫#[default],}#{?@claude_armed,#[fg=#a6e3a1]  ARMED#[default],}'

# display-panes colours (prefix + q) — also drive the choose-tree preview
# indicator, whose default tree-mode-preview-style references these two options.
# Mocha palette so both surfaces match the theme rather than stock blue/red:
# active pane/item pink, others blue.
set -g display-panes-colour "#89b4fa"
set -g display-panes-active-colour "#f38ba8"

# Popup borders — rounded frame with catppuccin blue, slight contrast on bg
set -g popup-border-lines rounded
set -g popup-border-style "fg=#89b4fa"
set -g popup-style "bg=#181825"

# Menus (display-menu) — same frame language as the popups above
set -g menu-style "bg=#181825,fg=#cdd6f4"
set -g menu-selected-style "bg=#89b4fa,fg=#1e1e2e"
set -g menu-border-style "fg=#89b4fa"
set -g menu-border-lines rounded

# Base indexes start at 1 (nicer than 0 for humans)
set -g base-index 1
setw -g pane-base-index 1

##### Keybinds (still using default prefix Ctrl-b) #####

# ── Overridden stock tmux defaults (so non-default keys are obvious) ──
# These deliberately replace a built-in default binding:
#   r  refresh-client    → reload config
#   f  find-window       → Fresh editor (jump windows via w / choose-tree)
#   l  last-window       → select-pane right (last-window is on Tab)
#   ,  rename-window     → manual label prompt seeded from visible tab label
#   D  choose-client     → hunk git diff / stage
#   L  switch-client -l  → layout presets
# Re-declared to the SAME effect (default kept, pinned here for clarity):
#   z zoom · E spread-evenly · Space next-layout · c new-window (+cwd) ·
#   M-1..M-5 layout presets · | and - splits (added alongside default % and ")
# Convention: a lowercase key's Capital is its companion/sibling (v/V nvim+help,
# f/F fresh+help, g/G lazygit+lgdf); Alt is the standalone-tool pocket (skl,
# memory, shotpath, branch, ghfzf, jjui ...), not a "variant" modifier.

# Reload config quickly
bind -N "Reload config" r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Zoom pane toggle (explicit — default binding lost after wrap-track rewrite)
bind -N "Zoom pane" z resize-pane -Z
bind -N "Zoom pane (double-click)" -n DoubleClick1Pane resize-pane -Z

# Toggle full hostname in status bar
bind -N "Toggle full hostname" H if -F '#{@hostname_full}' 'set -gu @hostname_full' 'set -g @hostname_full 1' \; display-message "Hostname: #{?@hostname_full,full,short}"

# Vim-style pane navigation (prefix + h/j/k/l) — preserves zoom
# Re-zooms after select-pane so you can cycle panes while staying zoomed.
bind -N "Select pane left (preserve zoom)" h if -F '#{window_zoomed_flag}' 'select-pane -L; resize-pane -Z' 'select-pane -L'
bind -N "Select pane down (preserve zoom)" j if -F '#{window_zoomed_flag}' 'select-pane -D; resize-pane -Z' 'select-pane -D'
bind -N "Select pane up (preserve zoom)" k if -F '#{window_zoomed_flag}' 'select-pane -U; resize-pane -Z' 'select-pane -U'
bind -N "Select pane right (preserve zoom)" l if -F '#{window_zoomed_flag}' 'select-pane -R; resize-pane -Z' 'select-pane -R'

# Clear screen (Ctrl+l is taken by pane nav, use prefix + Ctrl+l)
bind -N "Clear screen" C-l send-keys 'C-l'

# Word navigation (Alt+Left/Right) — forward to shell
bind-key -n M-Left send-keys M-b
bind-key -n M-Right send-keys M-f

# Window switching without prefix (Alt + Shift + h/l)
bind -N "Previous window" -n M-H previous-window
bind -N "Next window" -n M-L next-window
bind -T copy-mode-vi M-H previous-window
bind -T copy-mode-vi M-L next-window

# Move window left/right without prefix (Ctrl + Alt + h/l)
bind -N "Move window left" -n C-M-h swap-window -t -1 \; previous-window
bind -N "Move window right" -n C-M-l swap-window -t +1 \; next-window

# Last window toggle
bind -N "Last window" Tab last-window

bind -N "Next window" n next-window
bind -N "Previous window" p previous-window

# Pane navigation without prefix (Ctrl + h/j/k/l, smart-splits.nvim aware, preserves zoom)
bind -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' { if -F '#{window_zoomed_flag}' 'select-pane -L; resize-pane -Z' 'select-pane -L' }
bind -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' { if -F '#{window_zoomed_flag}' 'select-pane -D; resize-pane -Z' 'select-pane -D' }
bind -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' { if -F '#{window_zoomed_flag}' 'select-pane -U; resize-pane -Z' 'select-pane -U' }
bind -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' { if -F '#{window_zoomed_flag}' 'select-pane -R; resize-pane -Z' 'select-pane -R' }
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Prompt navigation in copy mode (OSC 133, requires shell integration marks)
bind -T copy-mode-vi ] send-keys -X next-prompt
bind -T copy-mode-vi [ send-keys -X previous-prompt

# Remove legacy no-prefix Alt+h/j/k/l resize binds when reloading this config.
unbind-key -n M-h
unbind-key -n M-j
unbind-key -n M-k
unbind-key -n M-l

# Pane resize mode (prefix + Alt+r, then h/j/k/l; q or Esc exits)
bind -N "Resize panes (h/j/k/l)" M-r switch-client -T pane-resize \; display-message "Resize: h/j/k/l, q/Esc exits"
bind -T pane-resize h resize-pane -L 3 \; switch-client -T pane-resize
bind -T pane-resize j resize-pane -D 3 \; switch-client -T pane-resize
bind -T pane-resize k resize-pane -U 3 \; switch-client -T pane-resize
bind -T pane-resize l resize-pane -R 3 \; switch-client -T pane-resize
bind -T pane-resize q display-message "Resize done"
bind -T pane-resize Escape display-message "Resize done"

# Create windows/panes in the current working directory
bind -N "New window in cwd" c new-window -c "#{pane_current_path}"
bind -N "Rename window manual label" , command-prompt -I '#{?automatic-rename,#{b:pane_current_path},#{window_name}}' -p "Manual window label:" "rename-window '%%'"
bind -N "Split vertical in cwd" | split-window -h -c "#{pane_current_path}"
bind -N "Split horizontal in cwd" - split-window -v -c "#{pane_current_path}"

# Rearrange panes/windows
bind -N "Break pane into window" ! break-pane
bind -N "Join pane from picker (left/right)" \\ choose-tree -Zw "join-pane -h -s '%%'"
bind -N "Join pane from picker (top/bottom)" _ choose-tree -Zw "join-pane -v -s '%%'"
# Bulk join/burst actions live under prefix + T Tools; keep direct bindings for
# reversible single-pane motions.
unbind-key -q J
unbind-key -q B
bind -N "Next layout" Space next-layout
bind -N "Previous layout" BSpace previous-layout
bind -N "Rotate panes backwards" M-o rotate-window -D

# Session / window pickers use tmux's default `s` and `w` (choose-tree); the
# custom fzf S / W duplicated them and are removed.

# Worktree popups (prefix + Alt+w new / Alt+Shift+W picker). new runs in a
# popup rooted at the pane's cwd so wt-add resolves the repo and its rs setup
# output stays visible, then offers placement ([enter] window · [v] pane here);
# pick shows repo + status markers, focuses an existing window before opening
# one, ctrl-v splits here, ctrl-x removes (wt-remove --delete-branch: merged
# branch deleted, unmerged kept).
bind -N "New worktree → window or pane (wt-add)" M-w \
  command-prompt -p "New worktree branch:" \
    "display-popup -E -w 80% -h 60% -d \"#{pane_current_path}\" '~/.config/tmux/scripts/wt-window.sh new %%'"
bind -N "Worktree picker (window · ctrl-v pane · ctrl-x remove)" M-W \
  display-popup -E -h 80% -w 85% '~/.config/tmux/scripts/wt-window.sh pick'

# fzf agents popup (prefix + A) — jump to a coding-agent pane, ranked by
# attention. A bare `tmux switch-client` from inside display-popup -E moves the
# real underlying client.
bind -N "Agents popup (fzf)" A display-popup -E -h 80% -w 85% '~/.config/tmux/scripts/agent-popup.sh'

# Skill loader — skl picker in popup (prefix + Alt+s)
# skl-pick composes `skl list | fzf | skl load --stdin` (fzf runs in the popup's
# real TTY). It queries the active pane itself for the
# --target: display-popup does NOT expand #{pane_id} in the command, and a popup
# doesn't change which pane is active, so the script resolves the origin pane.
bind -N "Skill loader (skl)" M-s display-popup -E -h 90% -w 90% \
  "$HOME/.config/skl/bin/pick"

# Scratch shell in a floating pane (prefix + `): persistent and non-modal,
# unlike a popup - switch away and it stays; mouse-drag to move/resize.
# ~ (shift sibling, same key) = small top-right corner variant. Geometry
# presets live in the flt function (single source; see flt.bats); run-shell
# passes this pane's cwd through. prefix + * reuses the window's last float
# geometry (stock new-pane behaviour) but is bound explicitly so it can
# unzoom first: tmux 3.7b use-after-frees the floating layout cell when
# new-pane fires on a zoomed window and the server segfaults
# (tmux/tmux#5327). flt carries the same guard. The unreleased 3.7c fixes
# this upstream by unzooming before the float - drop both guards then.
bind -N "Scratch shell · centred float" ` run-shell "$HOME/.local/bin/flt -c '#{pane_current_path}'"
bind -N "Scratch shell · top-right float" '~' run-shell "$HOME/.local/bin/flt -c '#{pane_current_path}' tr"
bind -N "New floating pane" '*' if -F '#{window_zoomed_flag}' 'resize-pane -Z' \; new-pane

# Lazygit in popup (prefix + g)
bind -N "Lazygit · git commit branch" g display-popup -E -h 98% -w 98% -d "#{pane_current_path}" \
  'zsh -ic "if [[ $PWD == $HOME ]]; then lgdf; else lazygit; fi"'

# Lazygit dotfiles from any pane (prefix + G) — capital sibling of g=lazygit
# (same tool, bare dotfiles repo). lgdf pins git-dir/work-tree so cwd is
# irrelevant, unlike prefix+g. Reclaims G from gh-dash (0 uses).
bind -N "Lazygit dotfiles · lgdf bare repo any pane" G display-popup -E -h 98% -w 98% \
  'zsh -ic "lgdf"'

# jjui (jj TUI) in popup (prefix + Alt+j) — plain j is pane-nav; jj equivalent of prefix+g lazygit
bind -N "jjui (jj TUI) · jujutsu vcs git" M-j display-popup -E -h 98% -w 98% -d "#{pane_current_path}" \
  'zsh -ic "if jj root >/dev/null 2>&1; then jjui; else echo \"No jj repo here. Run: jj git init --colocate\"; read -k1 -s; fi"'

# Hunk git diff / stage in popup (prefix + D) — hunk.dev; D reclaims the slot
# left by difftastic (0 uses). Handles the bare dotfiles repo when in ~.
bind -N "Hunk git diff · hunks stage" D display-popup -E -h 98% -w 98% -d "#{pane_current_path}" \
  'zsh -ic "if [[ $PWD == $HOME ]]; then GIT_DIR=$HOME/git/dotfiles GIT_WORK_TREE=$HOME hunk diff; else hunk diff; fi"'

# Critique git diff in popup (prefix + C)
bind -N "Critique git diff" C run-shell '~/.config/tmux/scripts/critique-popup.sh "#{pane_current_path}"'

# GitHub triage in popup (prefix + Alt+g)
bind -N "GitHub triage · ghfzf pr issue run" M-g display-popup -E -h 98% -w 98% -d "#{pane_current_path}" 'zsh -ic "ghfzf --tmux-popup"'

# GitHub access grant/revoke in popup (prefix + Alt+Shift+G)
bind -N "GitHub access grant/revoke · gh-gate token" M-G display-popup -E -h 60% -w 70% \
  'zsh -ic "gh-gate ui"'

# Open pane cwd in chosen GUI app (prefix + O) — palette via display-menu
bind -N "Open cwd in… (palette)" O display-menu -T " Open cwd in… " -x C -y C \
  "Zed"     z "run-shell 'zed \"#{pane_current_path}\"'" \
  "VS Code" c "run-shell 'code \"#{pane_current_path}\"'" \
  "" \
  "Finder / xdg-open" f "run-shell 'if [ \"$(uname)\" = \"Darwin\" ]; then open \"#{pane_current_path}\"; else xdg-open \"#{pane_current_path}\" 2>/dev/null; fi'"

# Neovim in popup (prefix + v)
bind -N "Neovim · vim editor" v display-popup -E -h 98% -w 98% -d "#{pane_current_path}" nvim

# Neovim help in popup (prefix + V)
bind -N "Neovim help · vim" V display-popup -E -w 80% -h 80% \
  'PAGER="less -R --mouse" glow -p -s dark ~/.config/nvim/help.md'

# Fresh in popup (prefix + f) — f = Fresh (reclaims default find-window; use w /
# choose-tree to jump windows). Capital F is its help, mirroring v / V for nvim.
bind -N "Fresh editor" f display-popup -E -h 98% -w 98% -d "#{pane_current_path}" fresh

# Fresh help in popup (prefix + F)
bind -N "Fresh help" F display-popup -E -w 80% -h 80% \
  'PAGER="less -R --mouse" glow -p -s dark ~/.config/fresh/help.md'

# Function/alias search
bind -N "Function/alias search · fns" M-f display-popup -E -h 98% -w 98% 'zsh -ic "fns"'

# Tools launcher (prefix + T) — fzf over occasional tmux/agent/net/proc utilities.
# Bulk pane/window reshapes, claude-watch, conns, ports, pclose, bandwhich, tsp,
# tpm-clean live here instead of one key each; entries are ../tools.tsv
# (label<TAB>command).
bind -N "Tools · tmux agent net proc tailscale tpm utilities" T display-popup -E -h 90% -w 90% -d "#{pane_current_path}" 'TMUX_TOOLS_PANE="#{pane_id}" TMUX_TOOLS_WINDOW="#{window_id}" TMUX_TOOLS_SESSION="#{session_name}" ~/.config/tmux/scripts/tools-popup.sh'

# System monitor — bottom (prefix + b)
bind -N "System monitor (bottom) · htop top cpu memory" b display-popup -E -h 98% -w 98% btm

# Memory pressure (prefix + Alt+m) — swap + top footprint offenders + agents
bind -N "Memory pressure · swap ram oom footprint" M-m display-popup -E -h 60% -w 70% '~/.config/tmux/scripts/mem-popup.sh'

# AI usage (prefix + a)
bind -N "AI usage · tokens cost claude" a display-popup -E -h 60% -w 60% '~/.config/tmux/scripts/ai-usage-popup.sh'

# Claude Code plan viewer (prefix + i)
bind -N "Claude Code plan" i run-shell '~/.config/tmux/scripts/claude-plan-popup.sh "#{pane_pid}" "#{pane_current_command}"'

# Branch the focused Claude/Codex session into a new pane/window (prefix + Alt+b)
# by resolving this pane's live session and forking it beside the original. Pane
# identity is captured at bind time and passed as args.
bind -N "Branch Claude/Codex session (fork into pane)" M-b \
  run-shell '~/.config/tmux/scripts/agent-branch-menu.sh "#{pane_id}" "#{pane_tty}" "#{pane_current_path}" "#{pane_pid}"'

# Copy a local/remote clipboard PNG or GIF path. This runs on the tmux server host;
# for remote tmux, use the local shotpath command/hotkey instead. Local is
# fire-and-forget (status-line feedback, no popup); remote keeps a popup for
# the fzf host picker + ssh prompts. Both paste the resulting path into the
# pane where the key was pressed (bracketed paste), with the clipboard as the
# fallback for non-tmux targets. Local passes #{pane_id} as argv (expanded at
# press time); the remote script self-resolves its origin pane because
# display-popup doesn't reliably expand formats in its command.
bind -N "Paste clipboard PNG/GIF path · shotpath local" M-i \
  run-shell -b '~/.config/tmux/scripts/shotpath-copy.sh "#{pane_id}"'
bind -N "Upload clipboard PNG/GIF · shotpath remote" M-I \
  display-popup -E -h 80% -w 80% '~/.config/tmux/scripts/shotpath-remote-popup.sh'

# Yank this pane's identity (id · tty · cmd · cwd) to the client clipboard via
# OSC52 (same path as copy-mode, works over SSH) plus the tmux buffer — for
# targeting a pane by id in join-pane/scripts. Fields are passed as argv so tmux
# expands the formats (set-buffer's data arg is literal). Values are the active
# pane's, captured at press time.
bind -N "Copy pane id·tty·cmd·path to clipboard · yank" Y \
  run-shell '~/.config/tmux/scripts/copy-pane-info.sh "#{pane_id}" "#{pane_tty}" "#{pane_current_command}" "#{pane_current_path}"'

# Cycle-jump to the next blocked agent pane (prefix + Alt+a): positional order
# (session → window → pane), wraps across sessions, falls back to done when
# nothing is blocked. Sibling of the prefix + A agents popup; Alt = standalone
# agent-tool pocket. (Claude auto-continue lives in prefix + T Tools and the
# right-click pane menu.) No -b: the jump must run in the key press's client.
bind -N "Jump to next blocked agent (else done)" M-a \
  run-shell '~/.config/tmux/scripts/agent-popup.sh cycle blocked "#{pane_id}"'

# Agent dot: set this pane's state by hand (prefix + Alt+.). Preview states, or
# mark a read pane "unread" (blue ●) before leaving — like an unread email.
bind -N "Agent dot: set state" M-. display-menu -T " agent dot " -x C -y C \
  "working  #[fg=#fab387]◐#[default]" w "run-shell 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh working'" \
  "blocked  #[fg=#f38ba8]◆#[default]" b "run-shell 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh blocked'" \
  "unread   #[fg=#89b4fa]●#[default]" u "run-shell 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh unread'" \
  "idle     #[fg=#a6e3a1]○#[default]" i "run-shell 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh idle'" \
  "" \
  "clear" c "run-shell 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh clear'"

# Right-click context menus (root table). Plain right-click opens the custom
# menus; tmux's stock MouseDown3 menus (Copy Word/Line, Search, hyperlinks,
# respawn…) remain untouched on Alt+right-click (M-MouseDown3* defaults).
# The pane guard is tmux's own default passthrough condition: app owns the
# mouse OR pane is in a non-copy/view mode → focus + forward the click.
# run-shell -t= expands formats against the pane under the mouse event.
bind -n MouseDown3Pane if -F -t= \
  '#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}' \
  { select-pane -t= ; send-keys -M } \
  { run-shell -t= '~/.config/tmux/scripts/context-menu.sh pane "#{pane_id}" #{mouse_x} #{mouse_y}' }
bind -n MouseDown3Status run-shell -t= \
  '~/.config/tmux/scripts/context-menu.sh window "#{window_id}" "#{pane_id}" "#{pane_current_path}" #{mouse_x} #{mouse_y}'
bind -n MouseDown3StatusLeft \
  run-shell '~/.config/tmux/scripts/context-menu.sh session #{mouse_x} #{mouse_y}'

# Layout presets picker (prefix + L) — reads from ~/.config/tmux/layouts/*.conf
bind -N "Layout presets" L display-popup -E "grep -h '^#' ~/.config/tmux/layouts/*.conf | sed 's/^# //' | fzf --reverse --header='Layout' | cut -d: -f1 | xargs -I{} tmux source-file ~/.config/tmux/layouts/{}.conf"

# Dynamic pane count (prefix + N) — prompt for total panes, then build two-row grid
bind -N "Create N two-row panes" N command-prompt -I "8" -p "Pane count" "run-shell 'sh ~/.config/tmux/scripts/layout-n.sh %% \"#{pane_id}\"'"

##### SSH agent forwarding #####

# Keep update-environment at tmux's default (which already includes
# SSH_AUTH_SOCK). The stable ~/.ssh/agent.sock symlink + the zshrc export are
# what actually keep agent forwarding working across reattach; an explicit
# override here only clobbered DISPLAY/SSH_CONNECTION/XAUTHORITY/etc. for no gain.
# `-u` (not just deleting the line) so reloading reverts any long-lived server
# that still carries a historical override back to the default.
set -gu update-environment

##### Quality-of-life #####

# Vi-style copy mode (enables copy-mode-vi bindings)
setw -g mode-keys vi

# Copy-mode search highlighting — Catppuccin Mocha (replaces tmux's stock
# cyan/magenta/red defaults). match = all hits, current = focused hit, mark = set-mark.
set -g copy-mode-match-style         "bg=#45475a,fg=#f9e2af"
set -g copy-mode-current-match-style "bg=#f9e2af,fg=#1e1e2e"
set -g copy-mode-mark-style          "bg=#f38ba8,fg=#1e1e2e"

# Keyboard scroll shortcuts: Shift+arrows for small steps, Shift+PageUp/PageDown for pages.
bind -n S-Up copy-mode \; send-keys -X -N 5 cursor-up
bind -n S-Down copy-mode \; send-keys -X -N 5 cursor-down
bind -n S-PPage copy-mode -u
bind -n S-NPage copy-mode \; send-keys -X page-down
bind -T copy-mode-vi S-Up send-keys -X -N 5 cursor-up
bind -T copy-mode-vi S-Down send-keys -X -N 5 cursor-down
bind -T copy-mode-vi S-PPage send-keys -X page-up
bind -T copy-mode-vi S-NPage send-keys -X page-down

# Wheel-scroll an inactive pane without stealing keyboard focus. The default
# copy-mode-vi wheel binds prepend `select-pane`, so continued scrolling of a
# pane makes it active and hijacks typing/dictation. Drop select-pane and target
# the pane under the mouse (-t=) explicitly: keeps keyboard focus on the active
# pane while the wheel scrolls whichever pane the pointer is over (e.g. read a
# long agent message while composing a reply in another pane).
# Trade-off: wheel scroll no longer focuses a pane — click or prefix+hjkl to move.
bind -T copy-mode-vi WheelUpPane   send-keys -X -t= -N 5 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -t= -N 5 scroll-down

bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel '$HOME/.config/tmux/scripts/osc52-copy-to-client.sh'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '$HOME/.config/tmux/scripts/osc52-copy-to-client.sh'
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel '$HOME/.config/tmux/scripts/osc52-copy-to-client.sh'
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel '$HOME/.config/tmux/scripts/osc52-copy-to-client.sh'

# Cross-window bell alerts (yellow highlight on inactive tab)
set -g monitor-activity off
set -g visual-activity off
set -g monitor-bell on
set -g visual-bell off

# Renumber windows when one is closed (keeps numbers tidy)
set -g renumber-windows on

# Don't delay after hitting prefix
set -g repeat-time 300

##### Reminders #####

# Show reminder (if set) on client attach
set-hook -g client-attached "run-shell -b 'sh ~/.config/tmux/reminder.sh'"

# Fix stale SSH agent symlink on reattach
set-hook -ga client-attached "run-shell -b 'sh ~/.config/tmux/scripts/fix-ssh-agent.sh'"

##### SSH visual cues (nested tmux safety) #####

# Refresh status bar on pane/window switch so mode indicator updates immediately
set-hook -g after-select-pane "refresh-client -S"
set-hook -g session-window-changed "refresh-client -S"

# Agent tracking: looking at a pane ages its agent's done → idle. Appended to the
# select-pane / window-changed hooks above - they fire deterministically on tmux
# navigation. Those miss one case: a pane can enter `done` while it is already the
# current pane of the current window (the Stop hook's window_active check races
# your focus), and returning to a pane you never navigationally left fires neither
# hook - so it sticks blue while you look at it. client-focus-in closes the gap:
# regaining terminal focus ages the active pane. Use client-focus-in, NOT
# pane-focus-in - the latter is accepted but never stored as a global hook (tmux
# 3.7b), so wiring it (as agent-state.sh's header once implied) is a silent no-op.
# select-pane / window-changed append (-ga) to the refresh-client hooks above;
# client-focus-in has no refresh base to append to, so it sets plainly (-g) -
# -ga there would stack a duplicate seen hook on every config reload.
# Gated on the focused pane being `done` (#{@agent_state}): `seen` only ages a
# done pane, so the fork is pure waste otherwise. Idle switches thus pay only
# refresh-client -S (~16ms vs ~47-60ms unguarded); the 10s sweep stays the backstop.
set-hook -ga after-select-pane "if -F '#{==:#{E:@agent_state},done}' { run-shell -b 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh seen' }"
set-hook -ga session-window-changed "if -F '#{==:#{E:@agent_state},done}' { run-shell -b 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh seen' }"
set-hook -g client-focus-in "if -F '#{==:#{E:@agent_state},done}' { run-shell -b 'AGENT_STATE_PANE=#{pane_id} ~/.config/tmux/scripts/agent-state.sh seen' }"

# Phase 5: clear stale agent dots (agents that died without a clean done/clear).
# Opportunistic one-shot on attach (instant freshness) + a single per-server
# background daemon (≤POLL continuous clearing while attached). -ga appends, so
# the reminder / ssh-agent client-attached hooks above are preserved.
set-hook -ga client-attached "run-shell -b 'sh ~/.config/tmux/scripts/agent-sweep.sh'"
set-hook -ga client-attached "run-shell -b 'sh ~/.config/tmux/scripts/agent-sweep.sh daemon'"

##### Clipboard (OSC 52) #####

# Enable copy to local clipboard over SSH via OSC 52 escape sequence
# Works with kitty, lazygit, neovim, and other OSC 52-aware tools
set -s set-clipboard on
# On: allow passthrough for visible pane only (tmux 3.3+). Needed for
# image protocols (kitty/sixel) in yazi etc. Safe: only the active pane can emit.
set -g allow-passthrough on

##### Help popup #####

# Show custom keybindings help (Ctrl+b ?)
bind-key -N "Help cheatsheet" ? display-popup -E -w 80% -h 80% \
  'PAGER="less -R --mouse" glow -p -s dark ~/.config/tmux/help.md'

# Command palette (Ctrl+b /): fzf over prefix bindings, replay the chosen key.
# Vendored self-contained script (replaces the tmux-command-palette plugin); strips
# the track-bind usage wrapper from the listing/preview. See scripts/cmd-palette.sh.
# (Replaced the old fzf-over-help.md search; `?` still browses the cheatsheet.)
bind -N "Command palette" '/' run-shell 'sh ~/.config/tmux/scripts/cmd-palette.sh'

##### Plugins (TPM) #####

# Plugins are nix-managed checkouts pinned to exact commits in
# home-shared.nix (pin_tmux_plugin) — the immutable sha, not a fork, is the
# supply-chain control. Checkouts are detached HEADs, so `prefix + U` is
# inert; updates flow through the pin.
#   Check for upstream updates:  tmux-upstream  (or -v for commit details)
#   Update: review the upstream diff, bump the sha in home-shared.nix, rebuild
# Exception: tmux-fingers is a compiled Crystal binary, so it can't be a git
# checkout — it's store-provided via nixpkgs (pkgs.tmuxPlugins.fingers) and
# symlinked into the plugins dir by a home.file in home-shared.nix. TPM just
# sources the already-present dir; bump it via nixpkgs, not a sha.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'alberti42/tmux-fzf-links'
# tmux-command-palette replaced by vendored scripts/cmd-palette.sh (bound to M-/ above)

# tmux-fingers settings — Alt+u auto-copies to tmux buffer + system clipboard
# (@fingers-use-system-clipboard on by default → pbcopy), a shift-hint pastes.
# Bindings off: fingers' defaults (F fingers, J jump) would clobber J (Join
# windows) and F (fresh help); bound to Alt+u explicitly after TPM below
# (Alt+u sits beside u=fzf-links, the sibling "grab from pane" tool, and
# overrides TPM's default Alt+u clean binding — clean lives in prefix+T Tools).
set -g @fingers-enable-bindings off
# Hint chars use Colemak home-row positions (effective hints arsteodh).
set -g @fingers-keyboard-layout colemak-homerow

# fzf-links settings (URLs → browser, files → editor, images → Preview/xdg-open)
set -g @fzf-links-key u
set -g @fzf-links-editor-open-cmd "tmux new-window -n 'edit' $EDITOR +%line '%file'"
set -g @fzf-links-history-lines 2000
set -g @fzf-links-user-schemes-path "~/.config/tmux/user_schemes.py"

# Session/process restoration
# ~<name> = restore process with strategy (see strategies/*.sh); bare name = exact match
set -g @resurrect-processes 'btm lazygit fresh "~claude" "~codex" "~opencode"'
set -g @resurrect-strategy-nvim 'persistence'
set -g @resurrect-strategy-claude 'session_id'
set -g @resurrect-strategy-codex 'session_id'
set -g @resurrect-strategy-opencode 'session_id'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-hook-post-save-layout '~/.config/tmux/scripts/resurrect-strip-nix-paths.sh $1 && ~/.config/tmux/scripts/resurrect-save-sessions.sh $1'

# Manual restore workflow (no auto-restore on startup):
#   Save:    prefix + Ctrl-s
#   Restore: prefix + Ctrl-r
set -g @continuum-save-interval '5'
set -g @continuum-restore 'off'
set-hook -gu session-closed

# CPU/RAM percentage format (no decimals)
set -g @cpu_percentage_format "%2.0f%%"
set -g @ram_percentage_format "%2.0f%%"

# Sync custom resurrect strategies into plugin dir (survives TPM updates)
run-shell 'cp ~/.config/tmux/strategies/*.sh ~/.config/tmux/plugins/tmux-resurrect/strategies/ 2>/dev/null || true'

# Initialize TPM (keep at very end of config)
run '~/.config/tmux/plugins/tpm/tpm'

# Annotate plugin bindings that ship without an -N note, so they appear in the
# command palette (prefix /). Re-bind after TPM with the same command + a note;
# wrap-track (below) then preserves the note. Commands mirror the plugins.
bind -N "Save session (resurrect) · persist backup"    C-s run-shell '~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh'
bind -N "Restore session (resurrect) · persist backup" C-r run-shell '~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh'
bind -N "Fingers: quick-copy text · hints yank"    M-u run-shell -b "#{@fingers-cli} start #{pane_id}"
bind -N "Install plugins (TPM)"       I   run-shell '~/.config/tmux/plugins/tpm/bindings/install_plugins'
bind -N "Update plugins (TPM)"        U   run-shell '~/.config/tmux/plugins/tpm/bindings/update_plugins'
# Clean unused plugins (TPM) moved into the prefix + T Tools launcher (tools.tsv).

# Usage tracking: dynamically wrap all prefix bindings with logging
run-shell 'sh ~/.config/tmux/scripts/wrap-track.sh'

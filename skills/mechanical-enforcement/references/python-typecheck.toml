# Python type-checking template.
# Paste the relevant sections into pyproject.toml.

[tool.basedpyright]
# Default gate for new Python projects. `recommended` gives broad diagnostics
# and fails warnings without the friction of `all`.
typeCheckingMode = "recommended"
pythonVersion = "3.12"
include = ["src", "tests"]
exclude = [
    "**/.venv",
    "**/.tox",
    "**/.nox",
    "**/__pycache__",
    "**/build",
    "**/dist",
    "**/generated",
]

# Adoption workflow for existing codebases:
#   basedpyright --writebaseline
# Commit .basedpyright/baseline.json, then let CI fail on new diagnostics.
# Do not write or refresh baselines in CI.

# Suppression policy:
# - Prefer `# pyright: ignore[reportX]` over bare `# type: ignore`.
# - Keep unnecessary-ignore diagnostics enabled so suppressions expire.

# Pyright compatibility fallback:
# - Use `[tool.pyright]` only when the project explicitly wants upstream pyright.
# - Run `pyright --warnings` in CI so warnings fail the gate.

# pyrefly (Meta, Rust) reached stable 1.x and is the more gate-ready of the two
# fast Rust newcomers (~92% conformance, production at Instagram/PyTorch). Use it
# as a fast secondary / migration aid, but it doesn't follow strict semver — a
# bump can introduce new errors — so keep basedpyright as the authoritative gate
# and pin pyrefly under the release-age quarantine. See pyrefly docs for the full
# key set.
#
# [tool.pyrefly]
# project-includes = ["src", "tests"]
# python-version = "3.12"
# # pyrefly's default `basic` preset does gradual typing and skips the bodies of
# # unannotated functions, so green can be shallow on untyped code. Set this to
# # check those bodies without forcing annotations - a meaningful gate:
# untyped-def-behavior = "check-and-infer-return-type"

# ty is faster still and fits the uv/ruff ecosystem, but upstream treats it as
# beta/0.0.x with explicitly-unstable diagnostics — watch/advisory only, do not
# gate on it yet. Pin tightly. Do not use `--error=all`; configure targeted
# stricter rules.
#
# [tool.ty]
# environment.python-version = "3.12"
#
# [tool.ty.terminal]
# error-on-warning = true
#
# [tool.ty.rules]
# missing-type-argument = "error"
# possibly-unresolved-reference = "warn"
